<body>
    <script>
    let n1 = Number(prompt("Digite o primeiro número:"));
    let n2 = Number(prompt("Digite o segundo número:"));
    let n3 = Number(prompt("Digite o terceiro número:"));  
    let n4 = Number(prompt("Digite o quarto número:"));
    let n5 = Number(prompt("Digite o quinto número:"));
    let n6 = Number(prompt("Digite o sexto número:"));
    
    let soma = 0;

    if (n1 < 72) soma += n1;
    if (n2 < 72) soma += n2;
    if (n3 < 72) soma += n3;
    if (n4 < 72) soma += n4;
    if (n5 < 72) soma += n5;
    if (n6 < 72) soma += n6;

    console.log("Números digitados:", n1, n2, n3, n4, n5, n6);
    console.log("Soma dos números menores que 72:", soma);

</script>
