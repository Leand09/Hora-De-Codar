<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let altura = Number(prompt("Digite sua altura (ex: 1.70):"));
let genero = Number(prompt("Digite 1 para feminino ou 2 para masculino:"));

let pesoIdeal;

if (genero === 2) {
    pesoIdeal = (72.7 * altura) - 58;
} else if (genero === 1) {
    pesoIdeal = (62.1 * altura) - 44.7;
}

console.log("Seu peso ideal é:", pesoIdeal);
    </script>
</body>
</html>
