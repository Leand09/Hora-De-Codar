<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let n1 = Number(prompt("Digite o primeiro número:"));
    let n2 = Number(prompt("Digite o segundo número:"));
    let n3 = Number(prompt("Digite o terceiro número:"));  
        let somatotal = n1 + n2 + n3;
        let menor;
    if (n1 < n2 && n1 < n3) {
    menor = n1;
    } else if (n2 < n1 && n2 < n3) {
    menor = n2;
    } else {
    menor = n3;
    }
     let resultado = somatotal - menor;
    console.log("A soma dos dois maiores números é: " + resultado);
    </script>
</body>
</html>
