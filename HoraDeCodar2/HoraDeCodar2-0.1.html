<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var num1 = prompt('Digite um número!')
        var num2 = prompt('Digite um segundo número!')
        if (num1 > num2) {
            alert(num1 + ' é maior que ' + num2) }
        else if (num1 < num2) {
            alert(num1 + ' é menor que ' + num2) }
        else {
            alert(num1 + ' é igual ao ' + num2) }
    




    </script>
</body>
</html>
