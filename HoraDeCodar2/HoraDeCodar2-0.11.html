<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
let n1 = Number(prompt("Digite o primeiro número:"));
let n2 = Number(prompt("Digite o segundo número:"));
let operacao = Number(prompt("Escolha a operação: 1-Adição, 2-Subtração, 3-Divisão, 4-Multiplicação"));

let resultado;

if (operacao === 1) {
    resultado = n1 + n2;
} else if (operacao === 2) {
    resultado = n1 - n2;
} else if (operacao === 3) {
    resultado = n1 / n2;
} else if (operacao === 4) {
    resultado = n1 * n2;
}

console.log("Resultado:", resultado);
    </script>
</body>
</html>
