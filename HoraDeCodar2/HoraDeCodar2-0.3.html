<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let n1 = Number(prompt("Digite o primeiro número:"));
    let n2 = Number(prompt("Digite o segundo número:"));
    let n3 = Number(prompt("Digite o terceiro número:"));  
    if (n1 > n2 && n1 > n3) {
        console.log("O maior número é: " + n1);
    } else if (n2 > n1 && n2 > n3) {
        console.log("O maior número é: " + n2);
    } else if (n3 > n1 && n3 > n2) {
        console.log("O maior número é: " + n3);
    } else {
        console.log("Há números iguais ou não foi possível determinar o maior número.");
    }

    </script>
</body>
</html>
