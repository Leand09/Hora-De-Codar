<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let N = Number(prompt("Digite um número maior que 0:"));

        for (let i = 1; i <= N; i++) {
            console.log("Tabuada do " + i + ":");
            for (let j = 1; j <= 10; j++) {
                console.log(i + " x " + j + " = " + (i * j));
            }
        }
    </script>
</body>
</html>
